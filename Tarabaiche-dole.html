
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marathi Script Practice Assistant (English Script)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            max-width: 650px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        label {
            font-weight: bold;
            color: #34495e;
        }

        select, button {
            padding: 10px 14px;
            font-size: 1rem;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        select {
            flex-grow: 1;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.2s ease-in-out;
            font-weight: bold;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .display-area {
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            min-height: 150px;
            background-color: #f8fafc;
            margin-bottom: 20px;
        }

        .speaker-tag {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .your-turn {
            color: #e74c3c;
        }

        .other-turn {
            color: #27ae60;
        }

        .heading-turn {
            color: #7f8c8d;
            font-style: italic;
        }

        .dialogue-text {
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .next-btn {
            width: 100%;
            background-color: #2ecc71;
            padding: 14px;
            font-size: 1.1rem;
        }

        .next-btn:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎭 Script Practice Assistant</h1>

    <div class="controls">
        <label for="characterSelect">Choose Character:</label>
        <select id="characterSelect"></select>
        <button id="startBtn">Start Practice</button>
    </div>

    <div class="display-area">
        <div id="speakerTag" class="speaker-tag heading-turn">Press 'Start' to begin</div>
        <div id="dialogueText" class="dialogue-text">Select your role from the menu above and click Start.</div>
    </div>

    <button id="nextBtn" class="next-btn" disabled>Next Dialogue ➡️</button>
</div>

<script>
const rawScript = `
Pahila Prasang
Tarabai: Gharat sone chandi, lakho rupaye, dagine sarv kahi aahe. Pan mi khup hatash aahe. Karan mala itke andhuk diste, ki divasahi ratr asaavi.
Shejarin: Kalji karu nako. Pratyek manasachya adachanicha, trasacha kadhina kadhi ant hot astoch. Kahitari todga nakkich nighel.
Tarabai (depressed): Aata kadhi? Mi gelyavar? Mi kadhi dole mitin, te kalnar nahi. Dole nasatil tar kahich nahi. Majhe dole bare karnaar-yala mi majha sampurna khajina dein, tarihi to sauda svastach tharel.
Shejarin: Aik Tarabai! Tujhya adachanivar jalim upay aahe. Prasiddha Hakim Girdharilal yanchya aushadhachya char pudya aani junyat juna aajar bara. Yanchya aushadhane aaple dole purna bare jhale ase Ganga kaka sangat hota, tujhehi hotil.
Tarabai: Tujhya tondat sakhar pado, sakhar pado! Radharani.
Tarabai (swatahshich): Hakim Girdharilal, yanna ghari bolavun pahayla have. Kadachit te majhe dole bare kartil.
Tarabai: Are o kaku, ikde tari ye. Ja beta, Hakimjina bolavun aan, 'Sethanine' bolavle aahe ase sang.
Kaku: Aamcha 'chendukhel' sampla ki mag.
Tarabai: Bagh beta, jara mahattvache kaam aahe. Patkan karun alas, tar tula khayla chocolate mirel.
Kaku (aanandat): Theek aahe. Ha gelo aani ha aalo.

Dusra Prasang
Tarabai: Tumche naav aani kirti mi khup aikli aahe. Mi dolyanni khup hatash aahe. Dole bare kara, sangal tevde paise. Paishala kami nahi. Ghar bharle aahe. Khanari mi ektich aahe. Pan majhi hi avastha.
Hakim: Kalji karu naka tumhi purna barya vhal.
Tarabai: Tumchya tondat sakhar pado. Pahije titki sampatti ghya pan dole bare kara.
Hakim: Dole khup kalapasun kharab distat. Mehanatiche kaam aahe. Kuthe kuthe shodhun jadibuti aanavya lagtil. Tya kutun tumchya dolyat takavya lagtil. Khup divas upachar chaltil. Paise kiti denar te spashta sang. Nantarach upachar.
Tarabai: Hakimji, majhe vachan! Majhe dole bare, ha sampurna khajina tumcha.
Hakim (khush houn): Theek aahe, udya pasunach upachar suru karato.

Tisra Prasang
Hakim: Hi patti sodu naka. Nahitar aushadhacha parinam sampun jail.
Tarabai: Theek aahe. Fhakta majhe dole lavkarat lavkar bare kara.
Hakim: Udya mi punha yeil.
Hakim: Bara Tarabai mi nighato. Ya pudya nakki kha.
Tarabai: Ho khate.
Hakim: Bara Tarabai, dev tumche bhale karo.
Tarabai: Hakimji, ajun paryant tari kahi vishesh farak disat nahi. Tyat varun patti. Mi tar adhipekshahi jasta lachar.
Hakim: Udya pasun disu lagel, patti udya sutel.

Cautha Prasang
Hakim (swatahshich): Ya mhatarice sagle molache saman tar mi adhica lambavle aahe. Aata patti ughadnyas harakat nahi. Aataparyant dolyat bhakta sadhe pani takat hoto. Aaj kharokharach aushadh takato.
Hakim: Tarabai aata dole ughadun bagha neet disatya ka?
Tarabai (chakit houn): Are he kay Hakimji? Gharatil sarv vastu gayab ghar rikame? Hakimji samajla tumcha dav. Dolyavar patti aani hi paravaa-paravi.
Hakim (kadak svarat): Bare jhalya var hi bhasha. Agodar jagat dolya peksha mothe kahich nahi. Aani dole milale tar sarv kahi arpan karu hi walgana.
Tarabai: Yacha arth asa nahi ki, tumhi majha khajina lutava. He changle nahi. Chor lutarunsarkhach majha khajina lambpas.
Hakim (dushtapane hasat): Tarabaiji tumhica tar mhanalat ki dole bare jhalya var majha sampurna khajina tumcha hoil. Aata dole bare jhalech aahet.
Tarabai (takrarichya surat): Ho pan bare jhalya var, agodar nahi. Mi majhya hatane dilahi asta, pan majhyashi pratarna keleli mala aavadli nahi.
Hakim (uddhatpane): Khajina adhi ghetala kay kiva nantar ghetala kay kay farak padato.
Tarabai: Khupach farak. Karan hi fasavnuk aahe. Mi sarpanchakade jaun takrar karte.

Pachva Prasang
Hakim (chalakhine): He bagha, mi kontihi chori keleli nahi. Khajina majha hota mi ghetala. Badalyat mhatarice dole bare kele. Tyannach vichara khare ki khote.
Sarpanch (Tarabaikade pahun): Aata tu sang Tarabai khari goshta kay hoti.
Tarabai: Dole bare karnayacha badalyat khajina denya ce vachan, he barobar. Pan dole ajun bare jhalelech nahit. Jhale astate tar majhya gharatil sonya chandice dagine, satasari har, phuldani, pitalechi sarv bhandi mala disli asti. Sarv gayab. Mag kase manu majhe dole bare jhale aahet?
Tarabai: Sarpanchji mi aajhi andhlich aahe. Jar Hakimjini majhe ghar adhisarkhe karun dile tar mi samajen majhe dole aata bare jhale aahet. Aani Hakimjina bakshisahi dein.
Sarpanch: Tumhi mhatarice je kahi saman chorun nele aahe te tabadtop karat kara. Nahitar tumhala kadak shiksha hoil.
Hakim (ghabarun): Mi aatta gheun yeto.
Tarabai: Hakimji aata tumhi magal te dete.
Hakim (lajene): Nahi nahi Tarabai mala kahihi nako.
Tarabai: Ho, aata vatate ki majhe dole kharokharach bare jhale aahet.
`;

let parsedScript = [];
let characters = new Set();
let currentIndex = -1;
let selectedCharacter = "";

// Parse raw script text
function parseScript() {
    const lines = rawScript.split('\n');
    // Matches "Name:" or "Name (emotion):"
    const regex = /^\s*([A-Za-z0-9\s]+?)(?:\s*\([^)]*\))?\s*:\s*(.+)$/;

    lines.forEach(line => {
        line = line.trim();
        if (!line) return;

        const match = line.match(regex);
        if (match) {
            let speaker = match[1].trim();
            let speech = match[2].replace(/\(.*?\)/g, '').trim(); // Remove stage notes inside line

            if (speaker && speech) {
                parsedScript.push({ type: 'dialogue', speaker, text: speech });
                characters.add(speaker);
            }
        } else {
            parsedScript.push({ type: 'heading', text: line });
        }
    });

    // Populate dropdown
    const select = document.getElementById('characterSelect');
    characters.forEach(char => {
        const option = document.createElement('option');
        option.value = char;
        option.textContent = char;
        select.appendChild(option);
    });
}

// Speech Synthesis function configured for Indian accent English reading
function speakText(text) {
    window.speechSynthesis.cancel(); // Stop any ongoing speech

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-IN'; // Indian English voice reads Romanized Marathi best
    utterance.rate = 0.9;     // Slightly slower rate for clarity

    window.speechSynthesis.speak(utterance);
}

// Navigation Handler
function nextDialogue() {
    window.speechSynthesis.cancel();
    currentIndex++;

    const speakerTag = document.getElementById('speakerTag');
    const dialogueText = document.getElementById('dialogueText');
    const nextBtn = document.getElementById('nextBtn');

    if (currentIndex >= parsedScript.length) {
        speakerTag.className = "speaker-tag heading-turn";
        speakerTag.textContent = "Finished!";
        dialogueText.textContent = "You have completed reading the script.";
        nextBtn.disabled = true;
        return;
    }

    const currentItem = parsedScript[currentIndex];

    if (currentItem.type === 'heading') {
        speakerTag.className = "speaker-tag heading-turn";
        speakerTag.textContent = "--- Scene Heading ---";
        dialogueText.textContent = currentItem.text;
    } else {
        if (currentItem.speaker === selectedCharacter) {
            speakerTag.className = "speaker-tag your-turn";
            speakerTag.textContent = `YOUR TURN (${currentItem.speaker})`;
            dialogueText.textContent = `👉 ${currentItem.text}`;
        } else {
            speakerTag.className = "speaker-tag other-turn";
            speakerTag.textContent = `Speaker: ${currentItem.speaker}`;
            dialogueText.textContent = currentItem.text;
            
            // Speak other character's line
            speakText(currentItem.text);
        }
    }
}

// Event Listeners
document.getElementById('startBtn').addEventListener('click', () => {
    selectedCharacter = document.getElementById('characterSelect').value;
    currentIndex = -1;
    document.getElementById('nextBtn').disabled = false;
    nextDialogue();
});

document.getElementById('nextBtn').addEventListener('click', nextDialogue);

// Initialize on load
parseScript();
</script>

</body>
</html>
