<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marathi Script Practice Assistant (English Script)</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            max-width: 650px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        label {
            font-weight: bold;
            color: #34495e;
        }

        select, button {
            padding: 10px 14px;
            font-size: 1rem;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        select {
            flex-grow: 1;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.2s ease-in-out;
            font-weight: bold;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .display-area {
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            min-height: 150px;
            background-color: #f8fafc;
            margin-bottom: 20px;
        }

        .speaker-tag {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .your-turn {
            color: #e74c3c;
        }

        .other-turn {
            color: #27ae60;
        }

        .heading-turn {
            color: #7f8c8d;
            font-style: italic;
        }

        .dialogue-text {
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .next-btn {
            width: 100%;
            background-color: #2ecc71;
            padding: 14px;
            font-size: 1.1rem;
        }

        .next-btn:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎭 Script Practice Assistant</h1>

    <div class="controls">
        <label for="characterSelect">Choose Character:</label>
        <select id="characterSelect"></select>
        <button id="startBtn">Start Practice</button>
    </div>

    <div class="display-area">
        <div id="speakerTag" class="speaker-tag heading-turn">Press 'Start' to begin</div>
        <div id="dialogueText" class="dialogue-text">Select your role from the menu above and click Start.</div>
    </div>

    <button id="nextBtn" class="next-btn" disabled>Next Dialogue ➡️</button>
</div>

<script>
const rawScript = `
Pahila Prasang
Tarabai: Gharat sone chandi, lakho rupaye, dagine sarv kahi aahe. Pan mi khup hatash aahe. Karan mala itke andhuk diste ki divasahi ratr asavi.
Shejarin: Kalji karu nako. Pratyek manasachya adachanicha, trasacha kadhina kadhi ant hot astoch. Kahitari todga nakkich nighel.
Tarabai (dukhi houn): Aata kadhi? Mi melyavar? Mi kadhi dole mitin te kalnar nahi. Dole nasatil tar kahich nahi. Majhe dole bare karnaar-yala mi majha sampurna khajina dein, tarihi to sauda svastach tharel.
Shejarin: Aik Tarabai! Tujhya adachanivar jalim upay aahe. Prasiddha Hakim Giridharilal yanchya aushadhachya char pudya aani junyat juna aajar bara. Tyanchya aushadhane aaple dole purna bare jhale ase Ganga kaka sangat hota. Tujhehi hotil.
Tarabai: Tujhya tondat sakhar pado, sakhar pado! Radharani.
Tarabai (swatahshich): Hakim Giridharilal yanna ghari bolavun pahayla have. Kadachit te majhe dole bare kartil.
Tarabai: Are o Kaku, ikde tari ye. Ja beta, Hakimjina bolavun aan. "Sethanine" bolavle aahe ase sang.
Kaku: Aamcha chendukhel sampla ki mag.
Tarabai: Bagh beta, jara mahatvache kaam aahe. Patkan kar aani chocolate ghe.
Kaku (aanandat): Thik aahe. Ha gelo aani ha aalo.
Dusra Prasang
Tarabai: Tumche naav aani kirti mi khup aikli aahe. Mi dolyanni khup hatash aahe. Dole bare kara. Sangal tevdhe paise. Paishala kami nahi. Ghar bharle aahe. Khanari mi ektich aahe. Pan majhi hi avastha.
Hakim: Kalji karu naka. Tumhi purna barya vhal.
Tarabai: Tumchya tondat sakhar pado. Pahije titki sampatti ghya pan dole bare kara.
Hakim: Dole khup kalapasun kharab distat. Mehanatiche kaam aahe. Kuthe kuthe shodhun jadibuti aanavya lagtil. Tya kutun tumchya dolyat takavya lagtil. Khup divas upachar chaltil. Paise kiti denar te spashta sanga. Nantarach upachar.
Tarabai: Hakimji, majhe vachan! Majhe dole bare jhale ki ha sampurna khajina tumcha.
Hakim (khush houn): Thik aahe. Udyapasunach upachar suru karto.
Tisra Prasang
Hakim: Hi patti sodu naka. Nahitar aushadhacha parinam sampun jail.
Tarabai: Thik aahe. Fakt majhe dole lavkarat lavkar bare kara.
Hakim: Udya mi punha yein.
Hakim: Bara Tarabai, mi nighato. Ya pudya nakki kha.
Tarabai: Ho, khate.
Hakim: Bara Tarabai, Dev tumche bhale karo.
Tarabai: Hakimji, ajun paryant tari kahi vishesh farak disat nahi. Tyat varun patti. Mi tar adhipekshahi jast lachar.
Hakim: Udyapasun disu lagel. Patti udya sutel.
Chautha Prasang
Hakim (swatahshich): Ya mhatariche sagle maulyavan saman tar mi aadhich lambavle aahe. Aata patti ughadnyas harakat nahi. Aataparyant dolyat fakt sadhe pani takat hoto. Aaj kharokharach aushadh takto.
Hakim: Tarabai, aata dole ughadun bagha. Neet disatay ka?
Tarabai (chakit houn): Are he kay Hakimji? Gharatil sarv vastu gayab! Ghar rikame? Hakimji, samajla tumcha dav. Dolyavar patti aani hi palavapalavi.
Hakim (kadak svarat): Bare jhalyavar hi bhasha? Agodar jagat dolyapeksha mothe kahich nahi. Aani dole milale tar sarv kahi arpan karu hi valgana.
Tarabai: Yacha arth asa nahi ki tumhi majha khajina lutava. He changle nahi. Chor-lutarunsarkhach majha khajina lampas.
Hakim (dushtpane hasat): Tarabaiji, tumhich tar mhanalat ki dole bare jhalyavar majha sampurna khajina tumcha hoil. Aata dole bare jhalech aahet.
Tarabai (takrarichya surat): Ho, pan bare jhalyavar. Agodar nahi. Mi majhya hatane dilahi asta. Pan majhyashi pratarana keleli mala avadli nahi.
Hakim (uddhatpane): Khajina adhi ghetla kay kiwa nantar ghetla kay, kay farak padto?
Tarabai: Khupach farak. Karan hi fasavnuk aahe. Mi Sarpanchakade jaun takrar karte.
Pachva Prasang
Hakim (chalakhine): He bagha, mi kontihi chori keleli nahi. Khajina majha hota. Mi ghetla. Badalyat mhatariche dole bare kele. Tyannach vichara khare ki khote.
Sarpanch (Tarabaikade pahun): Aata tu sang Tarabai. Khari gosht kay hoti?
Tarabai: Dole bare karnyachya badalyat khajina denyache vachan, he barobar. Pan dole ajun bare jhalelech nahit. Jhale aste tar majhya gharatil sonya-chandiche dagine, satasari har, phuldani, pitalechi sarv bhandi mala disli asti. Sarv gayab. Mag kase manu majhe dole bare jhale aahet?
Tarabai: Sarpanchji, mi aajhi andhlich aahe. Jar Hakimjini majhe ghar aadhisarkhe karun dile tar mi samajen majhe dole aata bare jhale aahet. Aani Hakimjina bakshisahi dein.
Sarpanch: Tumhi mhatariche je kahi saman chorun nele aahe te tabadtob parat kara. Nahitar tumhala kadak shiksha hoil.
Hakim (ghabarun): Mi aatta gheun yeto.
Tarabai: Hakimji, aata tumhi magal te dete.
Hakim (lajene): Nahi nahi Tarabai. Mala kahihi nako.
Tarabai: Ho, aata vatate ki majhe dole kharokharach bare jhale aahet.
`;

let parsedScript = [];
let characters = new Set();
let currentIndex = -1;
let selectedCharacter = "";
let availableVoices = [];

// Load system voices
function loadVoices() {
    availableVoices = window.speechSynthesis.getVoices();
}
if ('speechSynthesis' in window) {
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();
}

// Parse raw script text
function parseScript() {
    const lines = rawScript.split('\n');
    const regex = /^\s*([A-Za-z0-9\s]+?)(?:\s*\([^)]*\))?\s*:\s*(.+)$/;

    lines.forEach(line => {
        line = line.trim();
        if (!line) return;

        const match = line.match(regex);
        if (match) {
            let speaker = match[1].trim();
            let speech = match[2].replace(/\(.*?\)/g, '').trim();

            if (speaker && speech) {
                parsedScript.push({ type: 'dialogue', speaker, text: speech });
                characters.add(speaker);
            }
        } else {
            parsedScript.push({ type: 'heading', text: line });
        }
    });

    const select = document.getElementById('characterSelect');
    characters.forEach(char => {
        const option = document.createElement('option');
        option.value = char;
        option.textContent = char;
        select.appendChild(option);
    });
}

// Speak function using Native Web Speech API
function speakText(text) {
    if (!('speechSynthesis' in window)) return;

    window.speechSynthesis.cancel(); // Stop active speech

    const utterance = new SpeechSynthesisUtterance(text);
    
    // Pick the best voice matching Indian phonetic pronunciation
    if (availableVoices.length === 0) loadVoices();
    
    const preferredVoice = availableVoices.find(voice => 
        voice.lang.includes('hi-IN') || voice.lang.includes('en-IN') || voice.lang.includes('mr-IN')
    );

    if (preferredVoice) {
        utterance.voice = preferredVoice;
    } else {
        utterance.lang = 'en-IN'; // Fallback language tag
    }

    utterance.rate = 0.60; // Slightly slower speed for clearer pronunciation
    window.speechSynthesis.speak(utterance);
}

// Navigation Handler
function nextDialogue() {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
    }
    
    currentIndex++;

    const speakerTag = document.getElementById('speakerTag');
    const dialogueText = document.getElementById('dialogueText');
    const nextBtn = document.getElementById('nextBtn');

    if (currentIndex >= parsedScript.length) {
        speakerTag.className = "speaker-tag heading-turn";
        speakerTag.textContent = "Finished!";
        dialogueText.textContent = "You have completed reading the script.";
        nextBtn.disabled = true;
        return;
    }

    const currentItem = parsedScript[currentIndex];

    if (currentItem.type === 'heading') {
        speakerTag.className = "speaker-tag heading-turn";
        speakerTag.textContent = "--- Scene Heading ---";
        dialogueText.textContent = currentItem.text;
    } else {
        if (currentItem.speaker === selectedCharacter) {
            speakerTag.className = "speaker-tag your-turn";
            speakerTag.textContent = `YOUR TURN (${currentItem.speaker})`;
            dialogueText.textContent = `👉 ${currentItem.text}`;
        } else {
            speakerTag.className = "speaker-tag other-turn";
            speakerTag.textContent = `Speaker: ${currentItem.speaker}`;
            dialogueText.textContent = currentItem.text;
            
            // Speak lines of other characters
            speakText(currentItem.text);
        }
    }
}

// Event Listeners
document.getElementById('startBtn').addEventListener('click', () => {
    selectedCharacter = document.getElementById('characterSelect').value;
    currentIndex = -1;
    document.getElementById('nextBtn').disabled = false;
    nextDialogue();
});

document.getElementById('nextBtn').addEventListener('click', nextDialogue);

// Initialize script parsing
parseScript();
</script>

</body>
</html>
